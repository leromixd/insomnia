<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Сюни ❤️</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Глубокий черный */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const heartParticles = [];
    const floatingHearts = [];
    const particleCount = 700; // Плотность центрального сердца

    // Формула сердца
    function getHeartPoint(t) {
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        return { x: x * 13, y: y * 13 }; // Масштаб сердца
    }

    // Частицы главного сердца
    class HeartParticle {
        constructor(t) {
            this.t = t;
            this.pos = getHeartPoint(t);
            this.size = Math.random() * 1.5 + 0.5;
            this.color = `hsla(${Math.random() * 20 + 340}, 90%, 65%, ${Math.random() * 0.7 + 0.3})`;
            this.offset = Math.random() * Math.PI * 2;
        }
        draw(pulse) {
            const x = this.pos.x * (1 + pulse * 0.08) + canvas.width / 2;
            const y = this.pos.y * (1 + pulse * 0.08) + canvas.height / 2;
            
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(x, y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Сердечки при клике
    class ClickHeart {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 12 + 6;
            this.speedX = (Math.random() - 0.5) * 8;
            this.speedY = (Math.random() - 0.5) * 8;
            this.opacity = 1;
            this.color = `hsla(${Math.random() * 40 + 330}, 100%, 70%, 1)`;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.opacity -= 0.015;
            this.size *= 0.99;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.opacity;
            ctx.fillStyle = this.color;
            ctx.translate(this.x, this.y);
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-this.size/2, -this.size/2, -this.size, this.size/3, 0, this.size);
            ctx.bezierCurveTo(this.size, this.size/3, this.size/2, -this.size/2, 0, 0);
            ctx.fill();
            ctx.restore();
        }
    }

    // Создаем основное сердце
    for (let i = 0; i < particleCount; i++) {
        const t = (i / particleCount) * Math.PI * 2;
        heartParticles.push(new HeartParticle(t));
    }

    function animate() {
        // Очистка с мягким шлейфом
        ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const pulse = Math.sin(Date.now() * 0.003); // Скорость биения

        // Рисуем частицы сердца
        heartParticles.forEach(p => p.draw(pulse));

        // Рисуем текст
        ctx.save();
        ctx.font = `bold ${24 + pulse * 2}px Arial`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#ff4d6d';
        ctx.fillText('Сюня, я тебя люблю!', canvas.width / 2, canvas.height / 2);
        ctx.restore();

        // Обработка кликовых сердечек
        for (let i = floatingHearts.length - 1; i >= 0; i--) {
            floatingHearts[i].update();
            floatingHearts[i].draw();
            if (floatingHearts[i].opacity <= 0) {
                floatingHearts.splice(i, 1);
            }
        }

        requestAnimationFrame(animate);
    }

    // Реакция на нажатие
    const handleAction = (x, y) => {
        for (let i = 0; i < 12; i++) {
            floatingHearts.push(new ClickHeart(x, y));
        }
    };

    window.addEventListener('mousedown', (e) => handleAction(e.clientX, e.clientY));
    window.addEventListener('touchstart', (e) => handleAction(e.touches[0].clientX, e.touches[0].clientY));

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    animate();
</script>

</body>
</html>
