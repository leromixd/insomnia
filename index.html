<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для тебя ❤️</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Черный фон */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

<canvas id="heartCanvas"></canvas>

<script>
    const canvas = document.getElementById('heartCanvas');
    const ctx = canvas.getContext('2d');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const heartParticles = [];
    const particleCount = 600; // Количество частиц в центральном сердце

    // Функция для получения координат сердца
    function getHeartPoint(t) {
        const x = 16 * Math.pow(Math.sin(t), 3);
        const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
        return { x: x * 15, y: y * 15 };
    }

    // Класс частицы для центрального сердца
    class HeartParticle {
        constructor(t) {
            this.t = t;
            this.pos = getHeartPoint(t);
            this.size = Math.random() * 2 + 1;
            this.color = `hsla(${Math.random() * 30 + 330}, 80%, 60%, ${Math.random() * 0.8 + 0.2})`;
            this.offset = Math.random() * Math.PI * 2;
        }
        draw() {
            const pulse = Math.sin(Date.now() * 0.002 + this.offset) * 3;
            const x = this.pos.x + canvas.width / 2 + (this.pos.x / 15) * pulse * 0.1;
            const y = this.pos.y + canvas.height / 2 + (this.pos.y / 15) * pulse * 0.1;
            
            ctx.fillStyle = this.color;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.beginPath();
            ctx.arc(x, y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Класс летящих сердечек при клике
    class FloatingHeart {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 10 + 5;
            this.speedX = (Math.random() - 0.5) * 6;
            this.speedY = (Math.random() - 0.5) * 6;
            this.opacity = 1;
            this.color = `hsla(${Math.random() * 60 + 330}, 90%, 70%, 1)`;
        }
        update() {
            this.x += this.speedX;
              this.y += this.speedY;
            this.opacity -= 0.015;
            this.size *= 0.98;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.opacity;
            ctx.fillStyle = this.color;
            ctx.translate(this.x, this.y);
            
            // Рисуем форму сердечка
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.bezierCurveTo(-this.size / 2, -this.size / 2, -this.size, this.size / 3, 0, this.size);
            ctx.bezierCurveTo(this.size, this.size / 3, this.size / 2, -this.size / 2, 0, 0);
            ctx.fill();
            ctx.restore();
        }
    }

    // Инициализация центрального сердца
    for (let i = 0; i < particleCount; i++) {
        const t = (i / particleCount) * Math.PI * 2;
        heartParticles.push(new HeartParticle(t));
    }

    const floatingHearts = [];

    function animate() {
        // Очистка с небольшим шлейфом
        ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Рисуем главное сердце
        heartParticles.forEach(p => p.draw());

        // Рисуем и обновляем сердечки от кликов
        for (let i = floatingHearts.length - 1; i >= 0; i--) {
            floatingHearts[i].update();
            floatingHearts[i].draw();
            if (floatingHearts[i].opacity <= 0) {
                floatingHearts.splice(i, 1);
            }
        }

        requestAnimationFrame(animate);
    }

    // Обработка клика
    window.addEventListener('mousedown', (e) => {
        for (let i = 0; i < 15; i++) {
            floatingHearts.push(new FloatingHeart(e.clientX, e.clientY));
        }
    });

    // Для мобильных устройств
    window.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        for (let i = 0; i < 15; i++) {
            floatingHearts.push(new FloatingHeart(touch.clientX, touch.clientY));
        }
    });

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    });

    animate();
</script>

</body>
</html>
